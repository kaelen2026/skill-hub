name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    # macos matches the dev environment and avoids installing Tauri's Linux
    # system deps (webkit2gtk etc.) just to compile the crate.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - run: npm ci

      - name: Quality gate
        run: sh scripts/quality-gate.sh
